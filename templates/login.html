{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Vedantaa Student Management</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("{% static 'images/images.jpeg' %}");
            background-size:cover;
            background-position:center;
        }

        .overlay{
            width:100%;
            height:100vh;
            background:rgba(0,0,0,0.6);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:350px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            text-align:center;
            color:white;
            box-shadow:0px 0px 20px rgba(0,0,0,0.5);
        }

        .login-box h1{
            font-size:32px;
            margin-bottom:10px;
            color:gold;
        }

        .login-box p{
            margin-bottom:30px;
            font-size:14px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:gold;
            color:black;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:white;
            transform:scale(1.05);
        }

        .footer{
            margin-top:20px;
            font-size:12px;
            color:#ddd;
        }

    </style>
</head>

<body>

<div class="overlay">

    <div class="login-box">

        <h1>🙏 Welcome</h1>

        <p>
            Vedantaa Student Management System
        </p>

        <form method="POST">

    {% csrf_token %}

    <input type="email"
           name="email"
           placeholder="Enter Email"
           value="{{ email }}"
           required>

    <input type="text"
           name="otp"
           placeholder="Enter OTP">

    <button type="submit">
        Send / Verify OTP
    </button>

</form>
